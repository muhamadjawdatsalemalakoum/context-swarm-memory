<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
<title id="title">BEAM 100K CSM versus Hindsight</title>
<desc id="desc">CSM scores 75.8 percent versus Hindsight 73.4 percent on AMB BEAM 100K, with 342 versus 326 correct rows, lower answer context, and higher retrieval latency.</desc>
<rect width="920" height="520" fill="white"/>
<text x="40" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">BEAM 100K: CSM vs accepted Hindsight</text>
<text x="40" y="68" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Agent Memory Benchmark, same answer/judge models. CSM internal retrieval uses Gemini 3.5 Flash.</text>
<g font-family="Inter, Arial, sans-serif" font-size="13">
<rect x="690" y="35" width="13" height="13" fill="#0e7c66"/><text x="710" y="47" fill="#111827">CSM</text>
<rect x="775" y="35" width="13" height="13" fill="#64748b"/><text x="795" y="47" fill="#111827">Hindsight</text>
</g>
